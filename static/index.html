<!DOCTYPE html><html><head><title>Saya's Adventure</title><script src="https://cdn.jsdelivr.net/npm/inkjs@2/dist/ink.js"></script><style>body{font-family:Arial;margin:40px} .choice{color:blue;cursor:pointer}</style></head><body><h1>Saya's Ontology World</h1><div id="story"></div><div id="choices"></div><script>let story = new inkjs.Story(`-> start === start Saya smirks. "Took you long enough." * [About you] -> intro * [Dive in] -> story_start === intro "I'm your sassy guide." -> start === story_start "Let's begin." -> END`); function refresh(){const s=document.getElementById('story');const c=document.getElementById('choices');c.innerHTML='';while(story.canContinue()) s.innerHTML += '<p>'+story.Continue()+'</p>';story.currentChoices.forEach((ch,i)=>{let b=document.createElement('div');b.className='choice';b.textContent=ch.text;b.onclick=()=>{story.ChooseChoiceIndex(i);fetch('/choice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({choice:ch.text})}).then(r=>r.json()).then(d=>{if(d.ink) {story=new inkjs.Story(d.ink);refresh();}})};c.appendChild(b);});} refresh();</script></body></html>
